# docker-compose.yml
#
# This compose file defines the translator app and connects it to NetBox.
#
# OPTION A (recommended): run the official netbox-docker stack as its own
# project, then attach this compose file to its network:
#
#   git clone -b release https://github.com/netbox-community/netbox-docker.git
#   cd netbox-docker && docker compose up -d
#   cd ../openconfig-automation && docker compose up -d
#
# This file's "translator" service joins the "netbox-docker_default" network
# so it can reach NetBox at http://netbox:8080.
#
# OPTION B: uncomment the "netbox" + "netbox-postgres" + "netbox-redis"
# services below for an all-in-one stack (slimmed down vs. the official repo
# - fine for a quick lab, but the official repo is better maintained).

version: "3.8"

networks:
  default:
    name: netbox-docker_default
    external: true

services:
  translator:
    build:
      context: ./translator
    container_name: translator
    env_file:
      - .env
    volumes:
      - ./translator:/app
      - ./output:/app/output
      - ./ansible/host_vars:/app/ansible_host_vars
    ports:
      - "8080:8080"   # FastAPI webhook receiver
    command: ["python", "main.py", "serve"]
    depends_on: []

