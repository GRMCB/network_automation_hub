# containerlab.yaml
#
# Lima VM configuration for running containerlab + Nokia SR Linux on macOS
# (especially Apple Silicon, where containerlab has no native binary and SR
# Linux images are amd64-only).
#
# Install Lima first:
#   brew install lima
#
# Start the VM using this config:
#   limactl start --name=clab ./containerlab.yaml
#
# Open a shell inside the VM:
#   limactl shell clab
#
# Stop / delete the VM:
#   limactl stop clab
#   limactl delete clab

# Use the amd64 Ubuntu image so SR Linux (amd64-only) runs without nested
# emulation surprises. This itself runs under QEMU emulation on Apple
# Silicon, which is slower to boot but behaves much closer to a real Linux
# host for containerlab's networking needs.
arch: "x86_64"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

cpus: 4
memory: "8GiB"
disk: "60GiB"

# Mount your project directory into the VM so containerlab can read
# topology.clab.yml and write its state files. Writable so containerlab
# can create its lab directory (clab-oc-lab/) alongside the topology file.
mounts:
  - location: "~/path/to/openconfig-automation"
    mountPoint: "/workspace"
    writable: true

# Forward the NETCONF ports defined in containerlab/topology.clab.yml so
# Ansible on your Mac can reach the SR Linux nodes at localhost:50001 / 50002.
portForwards:
  - guestPort: 50001
    hostPort: 50001
  - guestPort: 50002
    hostPort: 50002

# Install Docker + containerlab automatically when the VM is created.
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # --- Install Docker Engine ---
      if ! command -v docker &> /dev/null; then
        curl -fsSL https://get.docker.com | sh
        usermod -aG docker "${LIMA_CIDATA_USER}"
      fi

      # --- Install containerlab ---
      if ! command -v containerlab &> /dev/null; then
        bash -c "$(curl -sL https://get.containerlab.dev)"
      fi

# Quick sanity check after the VM boots.
probes:
  - description: "docker and containerlab installed"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      command -v docker
      command -v containerlab
    hint: |
      Provisioning may still be running. Check with:
        limactl shell clab -- cloud-init status
