---
# deploy_interfaces.yml
#
# Pushes the validated openconfig-interfaces payload (generated by
# translator/main.py and stored per-device in ansible/host_vars/<device>.yml
# as `openconfig_interfaces_xml`) to the device's running configuration via
# NETCONF <edit-config>.
#
# Usage:
#   ansible-playbook playbooks/deploy_interfaces.yml -l spine-01
#
# Requires:
#   ansible-galaxy collection install ansible.netcommon
#   ansible-galaxy collection install nokia.srlinux   # if targeting SR Linux

- name: Deploy validated OpenConfig interfaces via NETCONF
  hosts: network_devices
  gather_facts: false
  connection: ansible.netcommon.netconf

  vars:
    # host_vars/<device>.yml provides openconfig_interfaces_xml, generated
    # by the translator app's pyangbind XML serializer.

  tasks:
    - name: Fail fast if no validated payload exists for this host
      ansible.builtin.fail:
        msg: >
          No openconfig_interfaces_xml found for {{ inventory_hostname }}.
          Run the translator first:
            docker compose exec translator python main.py --device {{ inventory_hostname }}
      when: openconfig_interfaces_xml is not defined

    - name: Show a diff of the candidate config (dry run)
      ansible.netcommon.netconf_config:
        content: "{{ openconfig_interfaces_xml }}"
        target: candidate
      check_mode: true
      register: candidate_diff

    - name: Display candidate diff
      ansible.builtin.debug:
        var: candidate_diff.diff
      when: candidate_diff.diff is defined

    - name: Apply validated OpenConfig interfaces payload
      ansible.netcommon.netconf_config:
        content: "{{ openconfig_interfaces_xml }}"
        target: running
        # NETCONF <edit-config> default-operation. "merge" updates only the
        # nodes present in the payload, leaving other config untouched -
        # appropriate since this payload only describes a subset of
        # interfaces translated from NetBox.
        default_operation: merge
      register: deploy_result

    - name: Show deployment result
      ansible.builtin.debug:
        var: deploy_result
