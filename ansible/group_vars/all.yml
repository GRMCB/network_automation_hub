# group_vars/all.yml
#
# Shared connection/behavior settings. Per-device OpenConfig payloads come
# from host_vars/<device>.yml, generated by the translator app
# (translator/main.py -> ansible/host_vars/<device>.yml).

ansible_python_interpreter: auto_silent

# Where the translator writes per-device host_vars files. If the translator
# container and Ansible run on the same host filesystem, point this at the
# shared volume from docker-compose.yml (./ansible/host_vars).
host_vars_source: "../ansible/host_vars"
